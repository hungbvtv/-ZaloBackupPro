name: Build ZaloBackupPro dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
            -isysroot $SDK \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework UniformTypeIdentifiers \
            -mios-version-min=13.0 \
            -dynamiclib \
            -o ZaloBackupPro.dylib \
            ZaloBackupPro.m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaloBackupPro-dylib
          path: ZaloBackupPro.dylib
